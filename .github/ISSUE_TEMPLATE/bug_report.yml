name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        **Do not report security vulnerabilities here** — use [GitHub Security Advisories](https://github.com/Esdex/Arcanum/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Arcanum version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Android version & device
      placeholder: "e.g. Android 14, Pixel 8"
    validations:
      required: true

  - type: dropdown
    id: flavor
    attributes:
      label: Build flavor
      options:
        - F-Droid
        - Google Play
        - GitHub Releases
        - Obtainium
        - Built from source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: If applicable. Do not include passwords, PINs, or container paths.
